services:
  postgres:
    image: postgres:17-alpine
    container_name: assetflow-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: assetflow
      POSTGRES_PASSWORD: assetflow
      POSTGRES_DB: assetflow
    volumes:
      - assetflow_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assetflow -d assetflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: assetflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - assetflow_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: assetflow-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: assetflow
      MINIO_ROOT_PASSWORD: assetflowsecret
    volumes:
      - assetflow_minio:/data

volumes:
  assetflow_pg:
  assetflow_redis:
  assetflow_minio:
